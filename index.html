<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP-StructureV3 版面结构化演示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f5f5; color: #333; }
header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 18px; font-weight: 600; }
header .tag { background: #e94560; padding: 2px 10px; border-radius: 12px; font-size: 12px; }

.container { display: flex; height: calc(100vh - 56px); }

/* 左侧 - 页面列表 */
.sidebar { width: 160px; background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 8px; }
.sidebar .page-thumb { cursor: pointer; padding: 6px; border-radius: 6px; margin-bottom: 4px; font-size: 13px; color: #666; }
.sidebar .page-thumb:hover { background: #f0f0f0; }
.sidebar .page-thumb.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; }
.sidebar .page-thumb.detected { border-left: 3px solid #34a853; }

/* 中间 - 图片预览 */
.preview { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; overflow: auto; padding: 16px; background: #eee; }
.img-container { position: relative; display: inline-block; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
.img-container img { display: block; max-width: 100%; height: auto; }
.bbox-overlay { position: absolute; border: 2px solid; opacity: 0.5; cursor: pointer; pointer-events: auto; transition: all 0.2s; }
.bbox-overlay.highlight { opacity: 1; box-shadow: 0 0 12px rgba(0,0,0,0.4); z-index: 10; }
.bbox-label { position: absolute; top: -18px; left: 0; font-size: 11px; padding: 1px 6px; color: #fff; border-radius: 3px; white-space: nowrap; pointer-events: none; }
/* 单元格边框 */
.cell-overlay { position: absolute; border: 1px solid rgba(234,67,53,0.4); background: rgba(234,67,53,0.03); cursor: pointer; pointer-events: auto; transition: all 0.15s; }
.cell-overlay.highlight { border: 2px solid #ea4335; background: rgba(234,67,53,0.25); z-index: 11; }

/* 右侧 - 检测结果（可拖动宽度）*/
.result-panel { flex: 1; min-width: 200px; background: #fff; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; position: relative; }
.resize-handle { position: absolute; left: -4px; top: 0; bottom: 0; width: 8px; cursor: col-resize; z-index: 20; }
.resize-handle:hover, .resize-handle.active { background: rgba(26,115,232,0.3); }
.result-header { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.result-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
.block-item { padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; border-left: 4px solid; cursor: pointer; transition: all 0.15s; }
.block-item:hover { filter: brightness(0.95); }
.block-item.highlight { outline: 2px solid #333; outline-offset: -1px; }
.block-item .label { font-weight: 600; }
.block-item .bbox-info { color: #888; font-size: 11px; margin-top: 2px; }
.block-item .order-num { float: right; color: #aaa; font-size: 11px; }

/* 表格单元格展示 */
.cells-toggle { margin-top: 6px; font-size: 12px; color: #1a73e8; cursor: pointer; user-select: none; }
.cells-mode-switch { display: inline-flex; gap: 0; margin-left: 8px; font-size: 11px; }
.cells-mode-switch span { padding: 1px 8px; border: 1px solid #ccc; cursor: pointer; color: #666; }
.cells-mode-switch span:first-child { border-radius: 3px 0 0 3px; }
.cells-mode-switch span:last-child { border-radius: 0 3px 3px 0; border-left: none; }
.cells-mode-switch span.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
.cells-table { margin-top: 6px; border-collapse: collapse; width: 100%; font-size: 11px; }
.cells-table td { border: 1px solid #ddd; padding: 3px 5px; cursor: pointer; transition: all 0.15s; word-break: break-all; }
.cells-table td:hover { background: #fef9e7; }
.cells-table td.highlight { background: #fce4ec !important; outline: 2px solid #ea4335; }
/* 树形结构 */
.cells-tree { margin-top: 6px; font-size: 12px; }
.tree-node { margin-left: 0; }
.tree-node .tree-label { cursor: pointer; padding: 2px 4px; border-radius: 3px; display: inline-block; transition: background 0.15s; }
.tree-node .tree-label:hover { background: #f0f0f0; }
.tree-node .tree-label.highlight { background: #fce4ec; outline: 2px solid #ea4335; }
.tree-node .tree-toggle { cursor: pointer; user-select: none; color: #999; margin-right: 2px; display: inline-block; width: 14px; }
.tree-children { margin-left: 18px; border-left: 1px solid #e0e0e0; padding-left: 8px; }
.tree-leaf { padding: 2px 4px; cursor: pointer; border-radius: 3px; display: flex; align-items: baseline; gap: 6px; }
.tree-leaf:hover { background: #f0f0f0; }
.tree-leaf.highlight { background: #fce4ec; outline: 2px solid #ea4335; }
.tree-leaf .tree-tag { font-size: 10px; padding: 0 5px; border-radius: 8px; background: #e8f5e9; color: #2e7d32; white-space: nowrap; }
.image-hint { margin-top: 6px; font-size: 11px; color: #e67e22; font-style: italic; }

/* 上传区 */
.upload-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
.upload-box { border: 2px dashed #ccc; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-box:hover { border-color: #1a73e8; background: #f8f9ff; }
.upload-box input { display: none; }
.upload-box .icon { font-size: 48px; margin-bottom: 12px; }
.upload-box p { color: #888; font-size: 14px; }

/* 按钮 */
.btn { padding: 6px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }

.loading { text-align: center; padding: 24px; color: #888; }

/* 结果视图切换 */
.view-switch { display: inline-flex; gap: 0; font-size: 12px; }
.view-switch span { padding: 3px 10px; border: 1px solid #ccc; cursor: pointer; color: #666; }
.view-switch span:first-child { border-radius: 4px 0 0 4px; }
.view-switch span:last-child { border-radius: 0 4px 4px 0; border-left: none; }
.view-switch span.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
/* JSON 视图 */
.json-view { flex: 1; overflow: auto; padding: 8px 12px; display: none; }
.json-view pre { font-family: "SF Mono", "Menlo", monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: #333; background: #f8f8f8; padding: 10px; border-radius: 6px; }
</style>
</head>
<body>

<header>
  <h1>PP-StructureV3 版面结构化演示</h1>
  <span class="tag">版面检测 + PDF 表格结构提取</span>
  <span id="modelStatus" class="tag" style="background:#ff9800">模型加载中...</span>
  <div style="flex:1"></div>
  <label class="btn" style="background:#e94560;color:#fff;cursor:pointer">
    上传文件
    <input type="file" id="headerFileInput" accept=".pdf,.png,.jpg,.jpeg,.bmp,.gif" style="display:none">
  </label>
</header>

<div class="container">
  <div class="sidebar" id="sidebar"></div>

  <div class="preview" id="preview">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-box" id="uploadBox">
        <div class="icon">📄</div>
        <p>点击或拖拽上传 PDF / 图片</p>
        <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.bmp,.gif">
      </div>
    </div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="result-header">
      <span>检测结果</span>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="view-switch">
          <span class="active" onclick="switchResultView('visual')">可视化</span>
          <span onclick="switchResultView('json')">JSON</span>
        </div>
        <button class="btn btn-primary" id="detectBtn" disabled>检测当前页</button>
      </div>
    </div>
    <div class="result-list" id="resultList">
      <div class="loading">上传文件后开始检测</div>
    </div>
    <div class="json-view" id="jsonView"></div>
  </div>
</div>

<script>
const LABEL_COLORS = {
  text: '#4285f4', paragraph_title: '#34a853', document_title: '#34a853',
  table: '#ea4335', table_title: '#ea4335', figure: '#fbbc05', figure_title: '#fbbc05',
  formula: '#ff6d01', header: '#46bdc6', footer: '#9aa0a6', footnote: '#9aa0a6',
  reference: '#ab47bc', abstract: '#7c4dff', content: '#4285f4', number: '#78909c',
  algorithm: '#00bcd4', seal: '#e91e63',
};

const CACHE_KEY = 'pp-struct-state';
const state = { docId: null, pages: [], activePage: null, detectedPages: {}, isPdf: false, resultView: 'visual' };

function saveCache() {
  const { docId, pages, activePage, detectedPages, isPdf, resultView } = state;
  localStorage.setItem(CACHE_KEY, JSON.stringify({ docId, pages, activePage, detectedPages, isPdf, resultView }));
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const cached = JSON.parse(raw);
    if (!cached.docId || !cached.pages?.length) return false;
    Object.assign(state, cached);
    return true;
  } catch { return false; }
}

// ── 结果视图切换 ─────────────────────────────────────────────────
function switchResultView(mode) {
  state.resultView = mode;
  document.querySelectorAll('.view-switch span').forEach(s => s.classList.remove('active'));
  document.querySelector(`.view-switch span[onclick*="${mode}"]`).classList.add('active');
  document.getElementById('resultList').style.display = mode === 'visual' ? 'block' : 'none';
  document.getElementById('jsonView').style.display = mode === 'json' ? 'block' : 'none';
  if (mode === 'json') renderJson();
  saveCache();
}

function renderJson() {
  const view = document.getElementById('jsonView');
  const data = state.detectedPages[state.activePage];
  if (!data) {
    view.innerHTML = '<div class="loading">暂无数据</div>';
    return;
  }
  const structured = data.structured || data;
  view.innerHTML = `<pre>${escHtml(JSON.stringify(structured, null, 2))}</pre>`;
}

// ── 模型状态轮询 ────────────────────────────────────────────────
let modelReady = false;
(async function pollModelStatus() {
  const el = document.getElementById('modelStatus');
  while (!modelReady) {
    try {
      const res = await fetch('/api/model-status');
      const data = await res.json();
      if (data.status === 'ready') {
        modelReady = true;
        el.textContent = '模型就绪';
        el.style.background = '#34a853';
        document.getElementById('detectBtn').disabled = !state.activePage;
        return;
      } else if (data.status === 'error') {
        el.textContent = '模型加载失败';
        el.style.background = '#ea4335';
        return;
      }
    } catch {}
    await new Promise(r => setTimeout(r, 1000));
  }
})();

// ── 上传 ──────────────────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const uploadBox = document.getElementById('uploadBox');

uploadBox.addEventListener('click', () => fileInput.click());
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.style.borderColor = '#1a73e8'; });
uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor = '#ccc'; });
uploadBox.addEventListener('drop', e => { e.preventDefault(); uploadBox.style.borderColor = '#ccc'; handleFile(e.dataTransfer.files[0]); });
document.getElementById('headerFileInput').addEventListener('change', function() { if (this.files[0]) handleFile(this.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  const form = new FormData();
  form.append('file', file);
  document.getElementById('resultList').innerHTML = '<div class="loading">上传中...</div>';

  const res = await fetch('/api/upload', { method: 'POST', body: form });
  const data = await res.json();
  state.docId = data.doc_id;
  state.pages = data.pages;
  state.isPdf = data.is_pdf;
  state.detectedPages = {};

  renderSidebar();
  selectPage(1);
  saveCache();
}

// ── 侧边栏 ────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = state.pages.map((_, i) => {
    const num = i + 1;
    const detected = state.detectedPages[num] ? ' detected' : '';
    const active = state.activePage === num ? ' active' : '';
    return `<div class="page-thumb${active}${detected}" onclick="selectPage(${num})">第 ${num} 页</div>`;
  }).join('');
}

// ── 选择页面 ──────────────────────────────────────────────────────
function selectPage(num) {
  state.activePage = num;
  const preview = document.getElementById('preview');
  const filename = state.pages[num - 1];

  preview.innerHTML = `<div class="img-container" id="imgContainer">
    <img id="pageImg" src="/api/images/${state.docId}/${filename}" onload="onImageLoaded()">
  </div>`;

  document.getElementById('detectBtn').disabled = !modelReady;
  renderSidebar();
  renderResults();
  if (state.resultView === 'json') renderJson();
  switchResultView(state.resultView);
  saveCache();
}

function onImageLoaded() {
  if (state.detectedPages[state.activePage]) {
    drawBoxes(state.detectedPages[state.activePage]);
  }
}

// ── 检测 ──────────────────────────────────────────────────────────
document.getElementById('detectBtn').addEventListener('click', detectCurrent);

async function detectCurrent() {
  const btn = document.getElementById('detectBtn');
  btn.disabled = true;
  btn.textContent = '检测中...';
  document.getElementById('resultList').innerHTML = '<div class="loading">正在做版面检测...</div>';

  try {
    const res = await fetch(`/api/detect/${state.docId}/${state.activePage}`, { method: 'POST' });
    const data = await res.json();
    state.detectedPages[state.activePage] = data;
    drawBoxes(data);
    renderResults();
    renderJson();
    renderSidebar();
    saveCache();
  } catch (e) {
    document.getElementById('resultList').innerHTML = `<div class="loading">检测失败: ${e.message}</div>`;
  }
  btn.textContent = '检测当前页';
  btn.disabled = false;
}

// ── 高亮联动 ─────────────────────────────────────────────────────
function clearHighlights() {
  document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
}

function highlightBlock(blockIdx) {
  clearHighlights();
  // 高亮图片上的 bbox
  const overlay = document.querySelector(`.bbox-overlay[data-block="${blockIdx}"]`);
  if (overlay) {
    overlay.classList.add('highlight');
    overlay.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  // 高亮右侧列表项
  const item = document.querySelector(`.block-item[data-block="${blockIdx}"]`);
  if (item) {
    item.classList.add('highlight');
    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function highlightCell(blockIdx, row, col) {
  clearHighlights();
  // 高亮图片上的单元格
  const cellEl = document.querySelector(`.cell-overlay[data-block="${blockIdx}"][data-row="${row}"][data-col="${col}"]`);
  if (cellEl) {
    cellEl.classList.add('highlight');
    const preview = document.getElementById('preview');
    const rect = cellEl.getBoundingClientRect();
    const previewRect = preview.getBoundingClientRect();
    if (rect.top < previewRect.top || rect.bottom > previewRect.bottom) {
      cellEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
  // 高亮右侧（表格 td 或 树形节点）
  const sel = `[data-block="${blockIdx}"][data-row="${row}"][data-col="${col}"]`;
  const target = document.querySelector(`.cells-table td${sel}, .tree-label${sel}, .tree-leaf${sel}`);
  if (target) {
    target.classList.add('highlight');
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // 确保容器是展开的
    const wrapper = target.closest('[id^="cells-"]');
    if (wrapper && wrapper.style.display === 'none') {
      toggleCells(wrapper.id);
    }
  }
}

// ── 绘制 bbox + 单元格 ───────────────────────────────────────────
function drawBoxes(data) {
  const container = document.getElementById('imgContainer');
  const img = document.getElementById('pageImg');
  if (!container || !img) return;

  container.querySelectorAll('.bbox-overlay, .cell-overlay').forEach(el => el.remove());

  const scaleX = img.clientWidth / data.width;
  const scaleY = img.clientHeight / data.height;

  data.blocks.forEach((block, blockIdx) => {
    const [x1, y1, x2, y2] = block.bbox;
    const color = LABEL_COLORS[block.label] || '#78909c';

    // 区域框（可点击）
    const div = document.createElement('div');
    div.className = 'bbox-overlay';
    div.dataset.block = blockIdx;
    div.style.left = (x1 * scaleX) + 'px';
    div.style.top = (y1 * scaleY) + 'px';
    div.style.width = ((x2 - x1) * scaleX) + 'px';
    div.style.height = ((y2 - y1) * scaleY) + 'px';
    div.style.borderColor = color;
    div.style.background = color + '15';
    div.addEventListener('click', (e) => { e.stopPropagation(); highlightBlock(blockIdx); });

    const label = document.createElement('span');
    label.className = 'bbox-label';
    label.style.background = color;
    label.textContent = `${block.label} #${block.order}`;
    div.appendChild(label);
    container.appendChild(div);

    // 绘制单元格（可点击）
    if (block.cells && block.cells.length > 0) {
      for (const cell of block.cells) {
        const [cx1, cy1, cx2, cy2] = cell.bbox;
        const cdiv = document.createElement('div');
        cdiv.className = 'cell-overlay';
        cdiv.dataset.block = blockIdx;
        cdiv.dataset.row = cell.row;
        cdiv.dataset.col = cell.col;
        cdiv.style.left = (cx1 * scaleX) + 'px';
        cdiv.style.top = (cy1 * scaleY) + 'px';
        cdiv.style.width = ((cx2 - cx1) * scaleX) + 'px';
        cdiv.style.height = ((cy2 - cy1) * scaleY) + 'px';
        cdiv.addEventListener('click', (e) => {
          e.stopPropagation();
          highlightCell(blockIdx, cell.row, cell.col);
        });
        container.appendChild(cdiv);
      }
    }
  });
}

// ── 结果列表 ──────────────────────────────────────────────────────
function renderResults() {
  const list = document.getElementById('resultList');
  const data = state.detectedPages[state.activePage];

  if (!data) {
    list.innerHTML = '<div class="loading">点击「检测当前页」开始</div>';
    return;
  }

  if (data.blocks.length === 0) {
    list.innerHTML = '<div class="loading">未检测到任何区域</div>';
    return;
  }

  list.innerHTML = data.blocks.map((b, idx) => {
    const color = LABEL_COLORS[b.label] || '#78909c';
    const [x1, y1, x2, y2] = b.bbox.map(v => Math.round(v));
    let extra = '';

    if (b.label === 'table') {
      if (b.cells && b.cells.length > 0) {
        extra = renderCellsTable(b.cells, idx);
      } else if (b.cells === null) {
        extra = '<div class="image-hint">图片来源，无法提取单元格结构（仅 PDF 支持）</div>';
      }
    }

    return `<div class="block-item" data-block="${idx}" style="border-left-color:${color}; background:${color}10" onclick="highlightBlock(${idx})">
      <span class="order-num">#${b.order}</span>
      <div class="label" style="color:${color}">${b.label}</div>
      <div class="bbox-info">[${x1}, ${y1}, ${x2}, ${y2}] — ${x2-x1}×${y2-y1}px</div>
      ${extra}
    </div>`;
  }).join('');
}

// 每个 table block 记住当前展示模式
const cellsViewMode = {};  // blockIdx -> 'grid' | 'tree'

function renderCellsTable(cells, blockIdx) {
  const id = `cells-${blockIdx}`;
  const mode = cellsViewMode[blockIdx] || 'grid';

  let html = `<div class="cells-toggle" onclick="event.stopPropagation(); toggleCells('${id}')">`;
  html += `▶ ${cells.length} 个单元格（点击展开）`;
  html += `<span class="cells-mode-switch" onclick="event.stopPropagation()">`;
  html += `<span class="${mode === 'grid' ? 'active' : ''}" onclick="switchCellsMode(${blockIdx}, 'grid')">表格</span>`;
  html += `<span class="${mode === 'tree' ? 'active' : ''}" onclick="switchCellsMode(${blockIdx}, 'tree')">树形</span>`;
  html += `</span></div>`;

  html += `<div id="${id}" style="display:none">`;
  if (mode === 'grid') {
    html += renderGrid(cells, blockIdx);
  } else {
    html += renderTree(cells, blockIdx);
  }
  html += `</div>`;
  return html;
}

function switchCellsMode(blockIdx, mode) {
  cellsViewMode[blockIdx] = mode;
  renderResults();
  // 重新展开
  const id = `cells-${blockIdx}`;
  const el = document.getElementById(id);
  if (el) {
    el.style.display = 'block';
    const toggle = el.previousElementSibling;
    toggle.innerHTML = toggle.innerHTML.replace('▶', '▼').replace('点击展开', '点击收起');
  }
}

function renderGrid(cells, blockIdx) {
  const maxRow = Math.max(...cells.map(c => c.row));
  const maxCol = Math.max(...cells.map(c => c.col));
  const grid = Array.from({ length: maxRow + 1 }, () => Array(maxCol + 1).fill(''));
  for (const c of cells) { grid[c.row][c.col] = c.text; }

  let html = '<table class="cells-table">';
  for (let r = 0; r <= maxRow; r++) {
    html += '<tr>';
    for (let c = 0; c <= maxCol; c++) {
      const t = grid[r][c];
      html += `<td data-block="${blockIdx}" data-row="${r}" data-col="${c}" title="${escHtml(t)}" onclick="event.stopPropagation(); highlightCell(${blockIdx}, ${r}, ${c})">${escHtml(t, true)}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function renderTree(cells, blockIdx) {
  // 构建网格数据（含 cell 引用）
  const maxRow = Math.max(...cells.map(c => c.row));
  const maxCol = Math.max(...cells.map(c => c.col));
  const grid = Array.from({ length: maxRow + 1 }, () => Array(maxCol + 1).fill(null));
  for (const c of cells) { grid[c.row][c.col] = c; }

  // 跳过表头行（row 0），从 row 1 开始构建树
  // 前 N-1 列为层级节点，最后一列为标签
  const colCount = maxCol + 1;
  const lastCol = maxCol;

  // 向上查找合并单元格的文本（空单元格继承上方同列的内容）
  function getText(row, col) {
    for (let r = row; r >= 0; r--) {
      const c = grid[r] && grid[r][col];
      if (c && c.text) return c;
    }
    return null;
  }

  // 构建层级树：{ text, cell, children[], tag }
  const roots = [];
  const levelMap = [];  // 每层当前活跃的节点

  for (let r = 1; r <= maxRow; r++) {
    // 确定本行每列的值（考虑合并单元格向上继承）
    const rowCells = [];
    for (let c = 0; c < colCount; c++) {
      rowCells.push(getText(r, c));
    }

    // 找到本行变化的最高层级
    let changedLevel = -1;
    for (let c = 0; c < colCount - 1; c++) {
      const cell = grid[r] && grid[r][c];
      if (cell && cell.text) {
        if (changedLevel === -1) changedLevel = c;
      }
    }
    if (changedLevel === -1) changedLevel = colCount - 2; // 只有最后列有内容

    // 从变化层级开始创建/更新节点
    for (let c = changedLevel; c < colCount - 1; c++) {
      const cellData = rowCells[c];
      if (!cellData || !cellData.text) continue;

      const node = {
        text: cellData.text,
        row: cellData.row,
        col: cellData.col,
        children: [],
        tag: null,
      };

      if (c === 0) {
        roots.push(node);
      } else {
        // 挂到上一层
        const parent = levelMap[c - 1];
        if (parent) parent.children.push(node);
        else roots.push(node);
      }
      levelMap[c] = node;
      // 清空下级
      for (let cc = c + 1; cc < colCount; cc++) levelMap[cc] = null;
    }

    // 最后一列作为标签，挂到最深层节点
    const tagCell = rowCells[lastCol];
    const deepest = levelMap[colCount - 2] || levelMap[colCount - 3] || roots[roots.length - 1];
    if (deepest && tagCell && tagCell.text) {
      deepest.tag = tagCell.text;
      deepest.tagRow = tagCell.row;
      deepest.tagCol = tagCell.col;
    }
  }

  // 递归渲染
  function renderNode(node, depth) {
    const hasChildren = node.children.length > 0;
    let html = '<div class="tree-node">';

    if (hasChildren) {
      html += `<span class="tree-toggle" onclick="event.stopPropagation(); toggleTreeNode(this)">▼</span>`;
      html += `<span class="tree-label" data-block="${blockIdx}" data-row="${node.row}" data-col="${node.col}" onclick="event.stopPropagation(); highlightCell(${blockIdx}, ${node.row}, ${node.col})">${escHtml(node.text, true)}</span>`;
      if (node.tag) {
        html += ` <span class="tree-tag">${escHtml(node.tag)}</span>`;
      }
      html += '<div class="tree-children">';
      for (const child of node.children) {
        html += renderNode(child, depth + 1);
      }
      html += '</div>';
    } else {
      // 叶子节点：按 \n 拆分要点，标签也拆分逐行配对
      const lines = node.text.split('\n').filter(l => l.trim());
      const tags = node.tag ? node.tag.split('\n').filter(l => l.trim()) : [];

      if (lines.length <= 1) {
        // 单行叶子
        html += `<div class="tree-leaf" data-block="${blockIdx}" data-row="${node.row}" data-col="${node.col}" onclick="event.stopPropagation(); highlightCell(${blockIdx}, ${node.row}, ${node.col})">`;
        html += `<span>${escHtml(node.text)}</span>`;
        if (node.tag) html += `<span class="tree-tag">${escHtml(node.tag)}</span>`;
        html += '</div>';
      } else {
        // 多行叶子：每行一个子项，标签逐行配对
        for (let li = 0; li < lines.length; li++) {
          const lineTag = tags.length === 1 ? tags[0] : (tags[li] || '');
          html += `<div class="tree-leaf" data-block="${blockIdx}" data-row="${node.row}" data-col="${node.col}" onclick="event.stopPropagation(); highlightCell(${blockIdx}, ${node.row}, ${node.col})">`;
          html += `<span>${escHtml(lines[li])}</span>`;
          if (lineTag) html += `<span class="tree-tag">${escHtml(lineTag)}</span>`;
          html += '</div>';
        }
      }
    }
    html += '</div>';
    return html;
  }

  let html = '<div class="cells-tree">';
  for (const root of roots) {
    html += renderNode(root, 0);
  }
  html += '</div>';
  return html;
}

function toggleCells(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const toggle = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    toggle.innerHTML = toggle.innerHTML.replace('▶', '▼').replace('点击展开', '点击收起');
  } else {
    el.style.display = 'none';
    toggle.innerHTML = toggle.innerHTML.replace('▼', '▶').replace('点击收起', '点击展开');
  }
}

function toggleTreeNode(toggle) {
  const children = toggle.parentElement.querySelector('.tree-children');
  if (!children) return;
  if (children.style.display === 'none') {
    children.style.display = 'block';
    toggle.textContent = '▼';
  } else {
    children.style.display = 'none';
    toggle.textContent = '▶';
  }
}

function escHtml(s, br) {
  if (!s) return '';
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  if (br) s = s.replace(/\n/g, '<br>');
  return s;
}

// ── 点击空白取消高亮 ─────────────────────────────────────────────
document.addEventListener('click', (e) => {
  if (!e.target.closest('.bbox-overlay, .cell-overlay, .block-item, .cells-table')) {
    clearHighlights();
  }
});

// ── 右侧面板拖动宽度 ─────────────────────────────────────────
(function() {
  const panel = document.getElementById('resultPanel');
  const handle = document.getElementById('resizeHandle');
  let dragging = false, startX, startW;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const newW = startW - (e.clientX - startX);
    panel.style.width = Math.max(200, Math.min(800, newW)) + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // 重绘 bbox（因为中间图片区域宽度变了）
    if (state.activePage && state.detectedPages[state.activePage]) {
      drawBoxes(state.detectedPages[state.activePage]);
    }
  });
})();

// ── 窗口缩放时重绘 ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (state.activePage && state.detectedPages[state.activePage]) {
    drawBoxes(state.detectedPages[state.activePage]);
  }
});

// ── 启动时恢复缓存 ──────────────────────────────────────────────
if (loadCache()) {
  renderSidebar();
  selectPage(state.activePage || 1);
}
</script>
</body>
</html>
